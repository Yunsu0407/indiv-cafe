<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 | Cafe Bada</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="list.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner container">
        <a class="brand-link" href="../index.html">Cafe Bada</a>
        <nav class="top-nav" aria-label="고객 메뉴">
          <a href="../menus/list.html">메뉴</a>
          <a aria-current="page" href="./list.html">장바구니</a>
          <a href="../orders/list.html">주문내역</a>
          <a href="../my/index.html">마이페이지</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <div id="cart-list" class="cart-list"></div>

      <div id="cart-summary" class="cart-summary glass-card" hidden>
        <div class="total-row">
          <span>총 금액</span>
          <span id="cart-total" class="total-price"></span>
        </div>
        <button id="btn-checkout" class="btn btn-primary btn-checkout" type="button">주문하기</button>
      </div>

      <section id="empty-state" class="empty-state glass-card" hidden>
        <h2>장바구니가 비어 있습니다.</h2>
        <p>마음에 드는 메뉴를 담아보세요.</p>
        <a class="btn btn-primary" href="../menus/list.html">메뉴 보러가기</a>
      </section>
      <p id="order-success" class="order-success" hidden>주문이 완료되었습니다. 감사합니다!</p>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner container">
        <div>
          <p class="site-footer__brand">Cafe Bada</p>
          <p class="site-footer__copy">바다의 여유를 닮은 커피와 디저트를 준비합니다.</p>
          <p class="site-footer__meta">매일 09:00 - 21:00 · Last order 20:30</p>
        </div>
      </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="list.js"></script>
  </body>
</html>
