<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | Cafe Bada</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner container">
        <a class="brand-link" href="../index.html">Cafe Bada</a>
      </div>
    </header>

    <main class="container auth-page">
      <form id="login-form" class="auth-card glass-card" novalidate>
        <div class="auth-heading">
          <h1>로그인이 필요합니다</h1>
          <p id="login-message">Cafe Bada의 주문 내역과 마이페이지는 로그인 후 이용할 수 있어요.</p>
        </div>

        <p id="error-message" class="error-message" hidden></p>

        <label class="form-field">
          <span>이메일</span>
          <input id="email" type="email" autocomplete="email" required />
        </label>

        <label class="form-field">
          <span>비밀번호</span>
          <input id="password" type="password" autocomplete="current-password" required />
        </label>

        <div class="auth-actions">
          <button class="btn btn-primary" type="submit">로그인</button>
          <a id="signup-link" class="btn btn-ghost" href="./signup.html">회원가입</a>
        </div>
      </form>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner container">
        <div>
          <p class="site-footer__brand">Cafe Bada</p>
          <p class="site-footer__copy">바다의 여유를 닮은 커피와 디저트를 준비합니다.</p>
          <p class="site-footer__meta">매일 09:00 - 21:00 · Last order 20:30</p>
        </div>
      </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
