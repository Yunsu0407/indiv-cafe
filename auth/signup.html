<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 | Cafe Bada</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="./signup.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner container">
        <a class="brand-link" href="../index.html">Cafe Bada</a>
      </div>
    </header>

    <main class="container auth-page">
      <form id="signup-form" class="auth-card glass-card" novalidate>
        <p id="error-message" class="error-message" hidden></p>

        <label class="form-field">
          <span>이름</span>
          <input id="name" type="text" autocomplete="name" required />
        </label>

        <label class="form-field">
          <span>이메일</span>
          <input id="email" type="email" autocomplete="email" required />
        </label>

        <label class="form-field">
          <span>비밀번호</span>
          <input id="password" type="password" autocomplete="new-password" required minlength="4" />
        </label>

        <button class="btn btn-primary" type="submit">회원가입</button>

        <p class="auth-switch">이미 계정이 있으신가요? <a href="./login.html">로그인</a></p>
      </form>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner container">
        <div>
          <p class="site-footer__brand">Cafe Bada</p>
          <p class="site-footer__copy">바다의 여유를 닮은 커피와 디저트를 준비합니다.</p>
          <p class="site-footer__meta">매일 09:00 - 21:00 · Last order 20:30</p>
        </div>
      </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="./signup.js"></script>
  </body>
</html>
