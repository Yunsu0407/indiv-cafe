<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Bada</title>
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./index.css" />
    <script src="./js/data.js" defer></script>
    <script src="./js/utils.js" defer></script>
    <script src="./index.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner container">
        <a class="brand-link" href="./index.html">Cafe Bada</a>
        <nav class="top-nav" aria-label="고객 메뉴">
          <a href="./menus/list.html">메뉴</a>
          <a href="./basket/list.html">장바구니</a>
          <a href="./orders/list.html">주문내역</a>
          <a href="./my/index.html">마이페이지</a>
        </nav>
      </div>
    </header>

    <main class="container home-page">
      <section class="bada-visual" aria-label="Cafe Bada 바다 이미지">
        <img
          src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80"
          alt="푸른 바다와 파도"
        />
      </section>

      <section class="menu-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Recommended</p>
            <h2>추천 메뉴</h2>
          </div>
          <a class="ghost-button" href="./menus/list.html">전체 메뉴 보기</a>
        </div>
        <div id="recommendedGrid" class="menu-grid" aria-live="polite"></div>
      </section>

      <section class="category-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Category</p>
            <h2>카테고리</h2>
          </div>
        </div>
        <div id="categoryList" class="category-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner container">
        <div>
          <p class="site-footer__brand">Cafe Bada</p>
          <p class="site-footer__copy">바다의 여유를 닮은 커피와 디저트를 준비합니다.</p>
          <p class="site-footer__meta">매일 09:00 - 21:00 · Last order 20:30</p>
        </div>
        <a class="home-footer__admin" href="/admin/index.html">관리자 페이지</a>
      </div>
    </footer>
  </body>
</html>
