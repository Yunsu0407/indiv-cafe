<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문내역 | Cafe Bada</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="./list.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner container">
        <a class="brand-link" href="../index.html">Cafe Bada</a>
        <nav class="top-nav" aria-label="고객 메뉴">
          <a href="../menus/list.html">메뉴</a>
          <a href="../basket/list.html">장바구니</a>
          <a aria-current="page" href="./list.html">주문내역</a>
          <a href="../my/index.html">마이페이지</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <section id="guest-view" class="guest-card glass-card" hidden>
        <h2>로그인이 필요합니다</h2>
        <p>주문 내역은 로그인 후 확인할 수 있어요.</p>
        <div class="guest-actions">
          <a class="btn btn-primary" href="../auth/login.html">로그인</a>
          <a class="btn btn-ghost" href="../auth/signup.html">회원가입</a>
        </div>
      </section>

      <div id="member-view" hidden>
        <section class="summary-grid" aria-label="주문 요약">
          <article class="summary-card glass-card">
            <span>전체 주문</span>
            <strong id="total-orders">0건</strong>
          </article>
          <article class="summary-card glass-card">
            <span>진행 중</span>
            <strong id="active-orders">0건</strong>
          </article>
          <article class="summary-card glass-card">
            <span>누적 금액</span>
            <strong id="total-price">₩0</strong>
          </article>
        </section>

        <div id="order-list" class="order-list" aria-live="polite"></div>

        <section id="empty-state" class="empty-state glass-card" hidden>
          <h2>아직 주문 내역이 없습니다.</h2>
          <p>장바구니에서 주문을 완료하면 이곳에서 내역을 확인할 수 있습니다.</p>
          <a class="btn btn-primary" href="../menus/list.html">메뉴 보러가기</a>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner container">
        <div>
          <p class="site-footer__brand">Cafe Bada</p>
          <p class="site-footer__copy">바다의 여유를 닮은 커피와 디저트를 준비합니다.</p>
          <p class="site-footer__meta">매일 09:00 - 21:00 · Last order 20:30</p>
        </div>
      </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="./list.js"></script>
  </body>
</html>
